name: Regenerate from OpenAPI

on:
  repository_dispatch:
    types: [openapi-updated]
  workflow_dispatch:
    inputs:
      spec_url:
        description: OpenAPI spec URL
        required: false
        default: https://raw.githubusercontent.com/armadadelivery/armada-sdks/main/spec/v2.yaml
      spec_sha:
        description: Source spec SHA
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Resolve payload
        id: payload
        run: |
          spec_url="${{ github.event.client_payload.spec_url || inputs.spec_url || 'https://raw.githubusercontent.com/armadadelivery/armada-sdks/main/spec/v2.yaml' }}"
          spec_sha="${{ github.event.client_payload.spec_sha || inputs.spec_sha || github.sha }}"
          echo "spec_url=$spec_url" >> "$GITHUB_OUTPUT"
          echo "spec_sha=$spec_sha" >> "$GITHUB_OUTPUT"

      - name: Download spec
        run: curl -fsSL "${{ steps.payload.outputs.spec_url }}" -o /tmp/armada-openapi-v2.yaml

      - name: Generate PHP SDK
        run: |
          cat > /tmp/armada-openapi-generator.yaml <<'YAML'
          generatorName: php
          outputDir: .regen/php
          inputSpec: /tmp/armada-openapi-v2.yaml
          additionalProperties:
            invokerPackage: Armada\SDK\Generated
            composerVendorName: armada
            composerProjectName: sdk-generated
            variableNamingConvention: camelCase
            srcBasePath: src
          YAML
          npx --yes @openapitools/openapi-generator-cli@2.13.4 generate --config /tmp/armada-openapi-generator.yaml

      - name: Copy generated output
        run: |
          rm -rf generated
          mkdir -p generated
          cp -a .regen/php/. generated/

      - name: Open regeneration PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(openapi): regenerate PHP SDK from ${{ steps.payload.outputs.spec_sha }}"
          title: "chore(openapi): regenerate PHP SDK"
          body: |
            Regenerated PHP SDK output from Armada OpenAPI spec.

            Spec SHA: `${{ steps.payload.outputs.spec_sha }}`
            Spec URL: `${{ steps.payload.outputs.spec_url }}`
          branch: chore/openapi-regen-${{ steps.payload.outputs.spec_sha }}
          delete-branch: true
